<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vikipedia</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Vikipedia</h1>
  </header>
  <main class="container">
    <section id="search" class="card">
      <h2>Search Wikipedia</h2>
      <div class="flex-row">
        <input type="text" id="searchInput" placeholder="Search articles">
        <button onclick="search()">Search</button>
      </div>
      <ul id="searchResults" class="results"></ul>
    </section>

    <section id="random" class="card">
      <h2>Random Article</h2>
      <button onclick="getRandom()">Show Random Article</button>
      <div id="randomResult" class="random-result"></div>
    </section>

    <section id="mostVisited" class="card">
      <h2>Most Visited Pages</h2>
      <ul id="visitedList" class="results"></ul>
    </section>
  </main>
  <script src="app.js"></script>
  </body>
  </html>
